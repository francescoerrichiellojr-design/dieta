<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Mia Dieta">
<title>La Mia Dieta</title>
<style>
:root{
  --teal:#00695C;--teal-d:#004D40;--teal-l:#E0F2F1;
  --amber:#D97706;--amber-l:#FEF3C7;
  --red:#DC2626;--red-l:#FEE2E2;
  --green:#16A34A;--green-l:#DCFCE7;
  --bg:#F2F2F7;--card:#fff;
  --txt:#1C1C1E;--txt2:#6B6B6E;
  --border:#E5E5EA;
  --st:env(safe-area-inset-top,44px);
  --sb:env(safe-area-inset-bottom,34px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--txt);max-width:430px;margin:0 auto;}
#app{display:flex;flex-direction:column;height:100vh;}
.hdr{background:var(--teal);color:#fff;padding:calc(var(--st) + 6px) 16px 12px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:21px;font-weight:700;letter-spacing:-.4px;}
.hdr-sub{font-size:12px;opacity:.75;margin-top:2px;}
.hdr-badge{background:rgba(255,255,255,.2);border-radius:12px;padding:4px 10px;font-size:12px;font-weight:600;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb) + 60px);}
.page{display:none;}.page.on{display:block;}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--sb);z-index:99;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 4px;cursor:pointer;border:none;background:none;}
.tab-i{font-size:23px;line-height:1;transition:transform .15s;}
.tab-l{font-size:10px;margin-top:2px;color:var(--txt2);font-weight:500;}
.tab.on .tab-l{color:var(--teal);font-weight:700;}
.tab.on .tab-i{transform:scale(1.12);}
.days{display:flex;gap:5px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.days::-webkit-scrollbar{display:none;}
.dpill{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;background:var(--card);color:var(--txt2);border:1.5px solid var(--border);cursor:pointer;white-space:nowrap;}
.dpill.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.dpill.today:not(.on){border-color:var(--teal);color:var(--teal);}
.mc{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.mh{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:.5px solid var(--border);}
.mi{font-size:19px;}.mn{font-size:15px;font-weight:600;}
.ml{padding:9px 14px;}
.mitem{font-size:14px;padding:2.5px 0;display:flex;gap:5px;}
.mitem::before{content:"·";color:var(--txt2);flex-shrink:0;margin-top:1px;}
.mnote{font-size:12px;color:var(--txt2);padding:7px 14px;background:var(--bg);font-style:italic;border-top:.5px solid var(--border);}
.sec{padding:0 16px 4px;}
.secttl{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;}
.row{display:flex;align-items:center;gap:8px;padding:8px 16px;}
.ibox{background:var(--teal-l);border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:10px 14px;margin:6px 16px;font-size:13px;color:var(--teal);font-weight:500;}
.wbox{background:var(--amber-l);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:10px 14px;margin:6px 16px;font-size:13px;color:var(--amber);font-weight:600;}
.rbox{background:var(--red-l);border-radius:12px;padding:12px 14px;margin:6px 16px;font-size:12px;color:#7F1D1D;line-height:1.7;}
.gbox{background:var(--green-l);border-radius:12px;padding:12px 14px;margin:6px 16px;font-size:12px;color:#14532D;line-height:1.7;}
.toggle{display:flex;margin:10px 16px 2px;background:var(--bg);border-radius:10px;padding:2px;border:1.5px solid var(--border);}
.tbtn{flex:1;padding:7px;border-radius:8px;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer;border:none;background:transparent;text-align:center;}
.tbtn.on{background:var(--card);color:var(--teal);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.cath{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--teal);padding:12px 16px 4px;}
.spsa-sec{margin:0 16px 4px;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.srow{background:var(--card);display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:.5px solid var(--border);cursor:pointer;}
.srow:last-child{border-bottom:none;}
.cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cb.on{background:var(--teal);border-color:var(--teal);}
.cb.on::after{content:"✓";color:#fff;font-size:12px;font-weight:700;}
.sq{font-size:13px;font-weight:700;color:var(--teal);min-width:56px;flex-shrink:0;}
.sn{font-size:14px;flex:1;}
.srow.done .sn{text-decoration:line-through;color:var(--txt2);}
.install{background:linear-gradient(135deg,var(--teal),#00897B);color:#fff;border-radius:12px;padding:14px;margin:8px 16px;font-size:13px;line-height:1.6;}
.install b{font-size:15px;display:block;margin-bottom:8px;}
.step{display:flex;gap:8px;padding:3px 0;align-items:center;}
.snum{background:rgba(255,255,255,.3);border-radius:50%;width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
#banner{display:none;}
</style>
</head>

];

// State
let tab='home',selN=0,selD=0,selS=0,sm='n';
let ck={};
try{ck=JSON.parse(localStorage.getItem('dk')||'{}');}catch(e){}
function saveck(){try{localStorage.setItem('dk',JSON.stringify(ck));}catch(e){}}

// Today
function td(){const d=new Date().getDay();return d===0?6:d-1;}

// Render helpers
function mc(meal,diar){
  const ico=MI[meal.n]||'🍽️';
  const isP=meal.n.includes('🍕')||meal.n==='Nota';
  const hbg=isP?'#FEF3C7':(diar?'#E0F2F1':'#F0FDF4');
  const htc=isP?'#92400E':(diar?'#004D40':'#14532D');
  let h=`<div class="mc" style="${isP?'border:1.5px solid #F59E0B;':''}"><div class="mh" style="background:${hbg}"><span class="mi">${ico}</span><span class="mn" style="color:${htc}">${meal.n}</span></div><div class="ml">`;
  meal.i.forEach(x=>h+=`<div class="mitem">${x}</div>`);
  h+=`</div>`;
  if(meal.t)h+=`<div class="mnote">${meal.t}</div>`;
  h+=`</div>`;
  return h;
}

function dpills(sel,fn,diar){
  const today=td();
  let h='<div class="days">';
  for(let i=0;i<7;i++){
    const act=i===sel,isTd=i===today;
    const st=act?`background:var(--teal);color:#fff;border-color:var(--teal);`:(isTd?'border-color:var(--teal);color:var(--teal);':'');
    h+=`<div class="dpill${act?' on':''}${isTd?' today':''}" style="${st}" onclick="${fn}(${i})">${DS[i]}${isTd?' ·':''}</div>`;
  }
  return h+'</div>';
}

// Pages
function rHome(){
  const t=td(),day=PN[t],now=new Date();
  const ds=now.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  let h=`<div style="background:linear-gradient(135deg,#00695C,#00897B);color:#fff;padding:20px 16px 16px;text-align:center;">
    <div style="font-size:12px;opacity:.75;text-transform:capitalize;">${ds}</div>
    <div style="font-size:28px;font-weight:700;margin:4px 0;letter-spacing:-.5px;">${DL[t]}</div>
    <div style="font-size:13px;opacity:.8;">${day.k}</div>
    ${day.pizza?'<div style="display:inline-block;background:rgba(255,255,255,.2);border-radius:12px;padding:3px 12px;font-size:12px;margin-top:6px;">🍕 Pizza stasera</div>':''}
  </div>
  <div id="banner" class="install">
    <b>📱 Salva sul tuo iPhone!</b>
    <div class="step"><div class="snum">1</div>Apri questo file in <b>Safari</b></div>
    <div class="step"><div class="snum">2</div>Tocca l'icona <b>Condividi</b> (quadrato con freccia)</div>
    <div class="step"><div class="snum">3</div>Scorri e tocca <b>"Aggiungi a schermata Home"</b></div>
    <div class="step"><div class="snum">4</div>Tocca <b>Aggiungi</b> — appare come un'app!</div>
  </div>
  <div class="sec"><div class="secttl">I tuoi pasti di oggi</div>`;
  day.m.forEach(m=>h+=mc(m,false));
  h+=`</div><div style="padding:0 16px 8px;"><div style="background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:13px;color:#374151;line-height:1.6;">
    💡 Bevi <b>1,5–2 litri d'acqua</b> durante la giornata. Se hai diarrea, vai alla tab 💊.
  </div></div>`;
  document.getElementById('pg-home').innerHTML=h;
  // show banner only if not standalone
  if(!window.navigator.standalone){
    document.getElementById('banner').style.display='block';
  }
}

function rPiano(){
  const day=PN[selN];
  let h=dpills(selN,'setN',false);
  h+=`<div style="display:flex;align-items:center;gap:8px;padding:2px 16px 8px;">
    <span style="font-size:16px;font-weight:700;">${DL[selN]}</span>
    <span style="font-size:12px;color:var(--txt2);">${day.k}</span>
    ${day.pizza?'<span style="background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;">🍕 Pizza</span>':''}
  </div>`;
  if(day.pizza)h+=`<div class="wbox">Giornata alleggerita — pranzo senza pane per lasciare spazio alla pizza sera</div>`;
  h+='<div class="sec">';
  day.m.forEach(m=>h+=mc(m,false));
  h+='</div>';
  document.getElementById('pg-piano').innerHTML=h;
}

function rDiarrea(){
  const day=PD[selD];
  let h=dpills(selD,'setD',true);
  h+=`<div style="display:flex;align-items:center;gap:8px;padding:2px 16px 8px;">
    <span style="font-size:16px;font-weight:700;">${DL[selD]}</span>
    <span style="font-size:12px;color:var(--txt2);">${day.k}</span>
    ${day.ps?'<span style="background:#FEE2E2;color:#DC2626;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;">🍕 Sospesa</span>':''}
  </div>
  <div class="ibox">💧 Bevi almeno 2 litri di acqua naturale a temperatura ambiente</div>
  <div class="sec">`;
  day.m.forEach(m=>h+=mc(m,true));
  h+=`</div>
  <div class="rbox"><b style="display:block;margin-bottom:4px;color:var(--red)">❌ Da evitare</b>
  Latte freddo · Verdure crude · Rucola, kiwi, fragole · Legumi · Frutta secca · Salmone affumicato · Manzo · Pasta/pane integrali · Caffè · Fritto</div>
  <div class="gbox"><b style="display:block;margin-bottom:4px;color:var(--green)">✅ Torna al piano normale quando</b>
  Feci formate da 24-48h · Nessun dolore · Buon appetito · Nessuna nausea</div>`;
  document.getElementById('pg-diarrea').innerHTML=h;
}

function rSpesa(){
  const data=sm==='n'?SN:SD;
  const day=data[selS];
  let h=`<div class="toggle">
    <button class="tbtn${sm==='n'?' on':''}" onclick="setSm('n')">🥗 Piano Normale</button>
    <button class="tbtn${sm==='d'?' on':''}" onclick="setSm('d')">💊 Diarrea</button>
  </div>`;
  h+=dpills(selS,'setSS',false);
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 16px 6px;">
    <span style="font-size:15px;font-weight:700;">${DL[selS]}</span>
    <button onclick="resetS()" style="background:none;border:none;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px;">Azzera ✕</button>
  </div>`;
  day.c.forEach(cat=>{
    h+=`<div class="cath">${cat.h}</div><div class="spsa-sec">`;
    cat.i.forEach((item,i)=>{
      const k=`${sm}_${selS}_${cat.h}_${i}`;
      const chk=!!ck[k];
      h+=`<div class="srow${chk?' done':''}" onclick="tog('${k}')"><div class="cb${chk?' on':''}"></div><span class="sq">${item[0]}</span><span class="sn">${item[1]}</span></div>`;
    });
    h+=`</div>`;
  });
  h+=`<div style="padding:16px;font-size:12px;color:#9CA3AF;text-align:center;">Tocca per spuntare · Le spunte si salvano automaticamente</div>`;
  document.getElementById('pg-spesa').innerHTML=h;
}

// Controls
function go(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  const tbs=['home','piano','diarrea','spesa'];
  document.querySelectorAll('.tab')[tbs.indexOf(t)].classList.add('on');
  document.getElementById('pg-'+t).classList.add('on');
  document.getElementById('cont').scrollTop=0;
  render(t);
}
function render(t){
  if(t==='home')rHome();
  else if(t==='piano')rPiano();
  else if(t==='diarrea')rDiarrea();
  else if(t==='spesa')rSpesa();
}
function setN(i){selN=i;rPiano();}
function setD(i){selD=i;rDiarrea();}
function setSS(i){selS=i;rSpesa();}
function setSm(m){sm=m;rSpesa();}
function tog(k){ck[k]=!ck[k];if(!ck[k])delete ck[k];saveck();rSpesa();}
function resetS(){const p=`${sm}_${selS}_`;Object.keys(ck).forEach(k=>{if(k.startsWith(p))delete ck[k];});saveck();rSpesa();}

// Init
const t0=td();
selN=t0;selD=t0;selS=t0;
document.getElementById('dbadge').textContent=DS[t0];
rHome();
</script>
